services:
  backend-api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: superpage-backend:latest
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  backend-payment:
    image: superpage-backend:latest
    depends_on:
      backend-api:
        condition: service_healthy
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "packages/backend/dist/backend/src/payment-service.js"]
    expose:
      - "3002"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_X402_CHAIN: ${NEXT_PUBLIC_X402_CHAIN:-bite-v2-sandbox}
        NEXT_PUBLIC_X402_CURRENCY: ${NEXT_PUBLIC_X402_CURRENCY:-USDC}
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
